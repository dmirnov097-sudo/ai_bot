<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Чат — GitHub Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title-section h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title-section p {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .model-badge {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: #888;
        }

        /* Контейнер чата */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Сообщения */
        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            justify-content: flex-end;
        }

        .message-bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message-user .bubble {
            background: linear-gradient(135deg, #2a2a4e, #1a1a3e);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-bot .bubble {
            background: #1a1a24;
            color: #e0e0e0;
            border: 1px solid #2a2a34;
            border-bottom-left-radius: 4px;
        }

        /* Код внутри сообщений */
        .bubble pre {
            background: #0d0d12;
            border-radius: 12px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .bubble code {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        /* Индикатор печати */
        .typing {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: #1a1a24;
            border-radius: 20px;
            border: 1px solid #2a2a34;
            width: fit-content;
            border-bottom-left-radius: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        /* Панель выбора модели */
        .model-panel {
            background: #0f0f14;
            padding: 12px 20px;
            border-top: 1px solid #1a1a24;
            border-bottom: 1px solid #1a1a24;
            overflow-x: auto;
            white-space: nowrap;
        }

        .model-panel-content {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .model-chip {
            background: #1a1a24;
            border: 1px solid #2a2a34;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #aaa;
        }

        .model-chip.active {
            background: linear-gradient(135deg, #4a4a6e, #2a2a4e);
            border-color: #6a6a8e;
            color: white;
        }

        .model-chip:hover {
            border-color: #5a5a7e;
        }

        .clear-chip {
            background: #2a1a1a;
            border-color: #4a2a2a;
            color: #cc6666;
        }

        /* Панель ввода */
        .input-panel {
            background: #0f0f14;
            padding: 12px 20px 20px;
            border-top: 1px solid #1a1a24;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper input {
            flex: 1;
            background: #1a1a24;
            border: 1px solid #2a2a34;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #5a5a7e;
        }

        .input-wrapper button {
            background: linear-gradient(135deg, #4a4a6e, #2a2a4e);
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-wrapper button:active {
            opacity: 0.7;
        }

        /* Скроллбар */
        .chat-container::-webkit-scrollbar {
            width: 5px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #0f0f14;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #2a2a34;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="title-section">
                <h1>🤖 AI Чат</h1>
                <p>GitHub Models · Бесплатно</p>
            </div>
            <div class="model-badge" id="modelBadge">Llama 3.2</div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message message-bot">
            <div class="bubble">✨ Привет! Я AI-помощник на базе GitHub Models.<br><br>Выбери модель и задавай вопросы. Код можно копировать.</div>
        </div>
    </div>

    <div class="model-panel">
        <div class="model-panel-content" id="modelSelector"></div>
    </div>

    <div class="input-panel">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autofocus>
            <button id="sendBtn">→</button>
        </div>
    </div>

    <script>
        let currentModel = 'llama';
        let isLoading = false;

        const models = {
            llama: { name: 'Llama 3.2', desc: 'Сбалансированная' },
            phi: { name: 'Phi-3.5 Mini', desc: 'Быстрая' },
            mistral: { name: 'Mistral 7B', desc: 'Лёгкая' }
        };

        function loadModels() {
            const container = document.getElementById('modelSelector');
            container.innerHTML = '';
            
            for (const [key, model] of Object.entries(models)) {
                const chip = document.createElement('div');
                chip.className = 'model-chip' + (currentModel === key ? ' active' : '');
                chip.textContent = model.name;
                chip.onclick = () => switchModel(key);
                container.appendChild(chip);
            }
            
            const clearChip = document.createElement('div');
            clearChip.className = 'model-chip clear-chip';
            clearChip.textContent = '🗑 Очистить';
            clearChip.onclick = clearChat;
            container.appendChild(clearChip);
        }

        function switchModel(model) {
            currentModel = model;
            document.querySelectorAll('.model-chip').forEach(chip => {
                if (chip.classList.contains('clear-chip')) return;
                chip.classList.remove('active');
            });
            event.target.classList.add('active');
            document.getElementById('modelBadge').textContent = models[model].name;
            addMessage('bot', `✅ Модель изменена на ${models[model].name}`);
        }

        function addMessage(role, text) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // Простое форматирование кода
            let formattedText = text;
            if (text.includes('```')) {
                formattedText = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            }
            bubble.innerHTML = formattedText.replace(/\n/g, '<br>');
            
            div.appendChild(bubble);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            addMessage('bot', '🧹 История очищена. Задавайте новые вопросы!');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isLoading) return;
            
            input.value = '';
            addMessage('user', text);
            isLoading = true;
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('chatContainer').appendChild(typingDiv);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
            
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text, model: currentModel })
                });
                const data = await response.json();
                typingDiv.remove();
                addMessage('bot', data.answer || '❌ Ошибка получения ответа');
            } catch (error) {
                typingDiv.remove();
                addMessage('bot', '❌ Ошибка соединения с сервером');
            } finally {
                isLoading = false;
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        loadModels();
        
        // Telegram WebApp API
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }
    </script>
</body>
</html>
